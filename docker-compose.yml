version: '3.8'

services:
  db:
    image: postgis/postgis:16-3.4
    container_name: vanguard-db
    environment:
      POSTGRES_DB: vanguard
      POSTGRES_USER: vanguard
      POSTGRES_PASSWORD: vanguard_secret_2026
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vanguard"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: vanguard-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
